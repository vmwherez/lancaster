<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <title>Registration</title>
</head>
<body>
    <section class="hero is-fullheight is-light">
        <div class="hero-body">
            <div class="container">
                <div class="columns is-centered">
                    <div class="column is-5-tablet is-4-desktop is-3-widescreen">
                        <div class="box">
                            <h1 class="title has-text-centered">Registration</h1>
                            
                            <form th:action="@{/register}" method="post">
                                <div class="field">
                                    <label class="label" for="username">Username</label>
                                    <div class="control">
                                        <input class="input" type="text" id="username" name="username" placeholder="Choose a username" autofocus="autofocus" required>
                                    </div>
                                </div>
                                
                                <div class="field">
                                    <label class="label" for="password">Password</label>
                                    <div class="control">
                                        <input class="input" type="password" id="password" name="password" placeholder="Choose a password" required>
                                    </div>
                                </div>
                                
                                <div class="field">
                                    <div class="control">
                                        <button class="button is-primary is-fullwidth" type="submit">
                                            Register
                                        </button>
                                    </div>
                                </div>
                            </form>
                            
                            <hr>
                            
                            <p class="has-text-centered">
                                Already have an account? <a href="/login">Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
