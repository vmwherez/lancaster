<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
        <title>Login</title>
    </head>
    <body>
        <section class="hero is-fullheight is-light">
            <div class="hero-body">
                <div class="container">
                    <div class="columns is-centered">
                        <div class="column is-5-tablet is-4-desktop is-3-widescreen">
                            <div class="box">
                                <h1 class="title has-text-centered">Login</h1>
                                
                                <div th:if="${param.error}" class="notification is-danger is-light">
                                    <button class="delete"></button>
                                    Invalid username and password.
                                </div>
                                
                                <div th:if="${param.logout}" class="notification is-success is-light">
                                    <button class="delete"></button>
                                    You have been logged out.
                                </div>
                                
                                <form th:action="@{/perform_login}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    
                                    <div class="field">
                                        <label class="label">Username</label>
                                        <div class="control">
                                            <input class="input" type="text" name="username" placeholder="Enter your username" required>
                                        </div>
                                    </div>
                                    
                                    <div class="field">
                                        <label class="label">Password</label>
                                        <div class="control">
                                            <input class="input" type="password" name="password" placeholder="Enter your password" required>
                                        </div>
                                    </div>
                                    
                                    <div class="field">
                                        <div class="control">
                                            <button class="button is-primary is-fullwidth" type="submit">
                                                Sign In
                                            </button>
                                        </div>
                                    </div>
                                </form>
                                
                                <hr>
                                
                                <p class="has-text-centered">
                                    Don't have an account? <a href="/register">Register</a>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
